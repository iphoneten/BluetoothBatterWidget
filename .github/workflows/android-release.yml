name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "RELEASE_TAG=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=manual-$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        env:
          BBW_RELEASE_KEYSTORE_BASE64: ${{ secrets.BBW_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$BBW_RELEASE_KEYSTORE_BASE64"
          mkdir -p app/keystore
          printf '%s' "$BBW_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/keystore/release.jks

      - name: Build signed release APK
        env:
          BBW_RELEASE_STORE_FILE: ${{ github.workspace }}/app/keystore/release.jks
          BBW_RELEASE_STORE_PASSWORD: ${{ secrets.BBW_RELEASE_STORE_PASSWORD }}
          BBW_RELEASE_KEY_ALIAS: ${{ secrets.BBW_RELEASE_KEY_ALIAS }}
          BBW_RELEASE_KEY_PASSWORD: ${{ secrets.BBW_RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Prepare release artifact
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/bluetooth-battery-widget-${RELEASE_TAG}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluetooth-battery-widget-${{ env.RELEASE_TAG }}
          path: release/*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 蓝电小组件 ${{ env.RELEASE_TAG }}
          files: release/*.apk
